spring.application.name=ai-gateaway
# PostgreSQL Sunucu Adresi ve senin koydu?un veritaban? ad? (ai-lore)
spring.datasource.url=jdbc:postgresql://localhost:5432/ai-lore

# Veritaban? kullan?c? ad? ve kurulumda belirledi?in ?ifre
spring.datasource.username=postgres
spring.datasource.password=admin

# Hibernate (JPA'n?n motoru) ayarlar?
# update: Java'da yazd???m?z s?n?flara bak?p, Postgres'te tablolar? otomatik olu?turur.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Arka planda çal??t?r?lan SQL kodlar?n? konsolda görmek için
spring.jpa.show-sql=true